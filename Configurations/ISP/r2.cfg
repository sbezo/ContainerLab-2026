!-------------------
! VRF
!-------------------
vrf CUST-A
 address-family ipv4 unicast
  import route-target
   65000:100
  !
  export route-target
   65000:100

interface GigabitEthernet0/0/0/0
 no shut

interface GigabitEthernet0/0/0/0.100
 vrf CUST-A
 ipv4 address 10.0.100.2 255.255.255.252
 encapsulation dot1q 100
 commit

!-------------------
! OSPF + MPLS
!-------------------
interface Loopback0
 ipv4 address 1.1.1.2 255.255.255.255

interface GigabitEthernet0/0/0/0
 ipv4 address 10.0.0.2 255.255.255.252
 mpls

router ospf 1
 router-id 1.1.1.2
 area 0
  interface Loopback0
   passive enable
  
  interface GigabitEthernet0/0/0/0
 
 mpls traffic-eng router-id Loopback0

mpls ldp
 router-id 1.1.1.2
 interface GigabitEthernet0/0/0/0