!-------------------
! Core connectivity
!-------------------

interface GigabitEthernet0/0/0/0
 no shut
 ipv4 address 10.10.0.2 255.255.255.252

interface GigabitEthernet0/0/0/1
 no shut

interface Loopback0
 ipv4 address 172.16.0.1 255.255.255.255


!-------------------
! Static routing over MPLS ISP
!-------------------

router static
 address-family ipv4 unicast
  172.16.0.2/32 10.10.0.1


!-------------------
! VPWS (xconnect)
!-------------------

interface GigabitEthernet0/0/0/1.200
 encapsulation dot1q 200
 ipv4 address 192.168.200.1 255.255.255.0

!-------------------
! Bridge Domain
!-------------------

interface GigabitEthernet0/0/0/1.300
 encapsulation dot1q 300
 ipv4 address 192.168.230.1 255.255.255.0
