!-------------------
! Core connectivity
!-------------------

interface GigabitEthernet0/0/0/0
 no shut
 ipv4 address 10.0.0.6 255.255.255.252

interface GigabitEthernet0/0/0/1
 no shut
 ipv4 address 10.10.0.5 255.255.255.252

interface Loopback0
 ipv4 address 1.1.1.2 255.255.255.255

router ospf 1
 router-id 1.1.1.2
 area 0
  interface Loopback0
  interface GigabitEthernet0/0/0/0
  
commit

!-------------------
! MPLS
!-------------------

mpls ldp
 router-id 1.1.1.2
 interface GigabitEthernet0/0/0/0

commit

!-------------------
! PE-PE iBGP (MP-BGP)
!-------------------

router bgp 65000
 bgp router-id 1.1.1.2
 address-family vpnv4 unicast

 neighbor 1.1.1.5
  remote-as 65000
  update-source Loopback0
  address-family vpnv4 unicast

commit

!-------------------
! VPNv4 CUST-A
!-------------------

vrf CUST-A
 address-family ipv4 unicast
  import route-target
   65000:100

  export route-target
   65000:100


interface GigabitEthernet0/0/0/1
 vrf CUST-A
 ipv4 address 10.10.0.5 255.255.255.252

router bgp 65000
 vrf CUST-A
  rd 65000:2
  address-family ipv4 unicast
   redistribute static

router static
 vrf CUST-A
  address-family ipv4 unicast
   172.16.0.2/32 10.10.0.6

commit