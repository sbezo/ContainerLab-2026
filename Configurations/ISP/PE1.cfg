!-------------------
! Core connectivity
!-------------------

interface GigabitEthernet0/0/0/0
 no shut
 ipv4 address 10.0.0.1 255.255.255.252
 exit

interface GigabitEthernet0/0/0/1
 no shut
 ipv4 address 10.10.0.1 255.255.255.252
 exit

interface GigabitEthernet0/0/0/2
 no shut

interface GigabitEthernet0/0/0/3
 no shut

interface Loopback0
 ipv4 address 1.1.1.1 255.255.255.255
 exit

router ospf 1
 router-id 1.1.1.1
 area 0
  interface Loopback0
  interface GigabitEthernet0/0/0/0
  exit
 exit



!-------------------
! MPLS
!-------------------

mpls ldp
 router-id 1.1.1.1
  interface GigabitEthernet0/0/0/0
  exit
 exit



!-------------------
! PE-PE iBGP (MP-BGP)
!-------------------

router bgp 65000
 bgp router-id 1.1.1.1
  address-family vpnv4 unicast
  exit
 
  neighbor 1.1.1.5
   remote-as 65000
   update-source Loopback0
    address-family vpnv4 unicast
    exit
   exit
  exit



!-------------------
! VPNv4 CUST-A
!-------------------

vrf CUST-A
 address-family ipv4 unicast
  import route-target
   65000:100
  export route-target
   65000:100
   exit
  exit
 exit


interface GigabitEthernet0/0/0/1
 vrf CUST-A
 ipv4 address 10.10.0.1 255.255.255.252
 exit

router bgp 65000
 vrf CUST-A
  rd 65000:1
  address-family ipv4 unicast
   redistribute static
   exit
  exit
 exit

router static
 vrf CUST-A
  address-family ipv4 unicast
   172.16.0.1/32 10.10.0.2
   exit
  exit
 exit


!-------------------
! VPWS (xconnect)
!-------------------

interface GigabitEthernet0/0/0/3.200 l2transport
 encapsulation dot1q 200
 rewrite ingress tag pop 1 symmetric
 exit

l2vpn
 xconnect group LAB-XC
  p2p VLAN200
   interface GigabitEthernet0/0/0/3.200
   neighbor ipv4 1.1.1.2 pw-id 200
   exit
  exit
 exit



!-------------------
! Bridge Domain
!-------------------

!--- Following Bridge Domain doesn't work on XRd Control Plane
!--- Only local ports on PE can be bridged

interface GigabitEthernet0/0/0/2.300 l2transport
 encapsulation dot1q 300
 rewrite ingress tag pop 1 symmetric

interface GigabitEthernet0/0/0/3.300 l2transport
 encapsulation dot1q 300
 rewrite ingress tag pop 1 symmetric
!

l2vpn
 bridge group LAB
  bridge-domain BD300
   interface GigabitEthernet0/0/0/2.300
   interface GigabitEthernet0/0/0/3.300
   vfi VFI300
    neighbor 1.1.1.2 pw-id 300

