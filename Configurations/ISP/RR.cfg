!-------------------
! Core connectivity
!-------------------

interface GigabitEthernet0/0/0/0
 no shut
 ipv4 address 10.0.0.10 255.255.255.252

interface Loopback0
 ipv4 address 1.1.1.5 255.255.255.255

router ospf 1
 router-id 1.1.1.5
 area 0
  interface Loopback0
  interface GigabitEthernet0/0/0/0
  
commit

!-------------------
! MPLS
!-------------------

mpls ldp
 router-id 1.1.1.5
 interface GigabitEthernet0/0/0/0

commit

!-------------------
! PE-PE iBGP (MP-BGP)
!-------------------

router bgp 65000
 bgp router-id 1.1.1.5
 address-family vpnv4 unicast
 !
 neighbor-group PE-CLIENTS
  remote-as 65000
  update-source Loopback0
  address-family vpnv4 unicast
   route-reflector-client

 neighbor 1.1.1.1
  use neighbor-group PE-CLIENTS
 
 neighbor 1.1.1.2
  use neighbor-group PE-CLIENTS
  
commit